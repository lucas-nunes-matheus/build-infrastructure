<svg xmlns="http://www.w3.org/2000/svg" width="920" height="340" viewBox="0 0 920 340">
  <rect width="920" height="340" fill="#f6f8fa"/>
  <rect x="24" y="24" width="872" height="292" rx="8" fill="#0d1117"/>
  <circle cx="52" cy="52" r="7" fill="#ff5f56"/>
  <circle cx="76" cy="52" r="7" fill="#ffbd2e"/>
  <circle cx="100" cy="52" r="7" fill="#27c93f"/>
  <text x="48" y="91" fill="#c9d1d9" font-family="monospace" font-size="18">$ terraform fmt -check</text>
  <text x="48" y="121" fill="#8b949e" font-family="monospace" font-size="16">Sem saida: arquivos ja estavam formatados.</text>
  <text x="48" y="161" fill="#c9d1d9" font-family="monospace" font-size="18">$ terraform init</text>
  <text x="48" y="191" fill="#c9d1d9" font-family="monospace" font-size="16">- Using previously-installed hashicorp/aws v5.100.0</text>
  <text x="48" y="221" fill="#3fb950" font-family="monospace" font-size="16">Terraform has been successfully initialized!</text>
  <text x="48" y="261" fill="#c9d1d9" font-family="monospace" font-size="18">$ terraform validate</text>
  <text x="48" y="291" fill="#3fb950" font-family="monospace" font-size="16">Success! The configuration is valid.</text>
</svg>
